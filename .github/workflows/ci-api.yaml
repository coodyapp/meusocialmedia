name: CI — api

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "packages/types/**"
      - "packages/utils/**"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "packages/types/**"
      - "packages/utils/**"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24.14.1"
  PNPM_VERSION: "10.33.0"

jobs:
  ci:
    name: Typecheck · Test · Build (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-api-${{ runner.os }}-${{ hashFiles('apps/api/**', 'packages/types/**', 'packages/utils/**') }}
          restore-keys: nx-api-${{ runner.os }}-

      - name: Typecheck
        run: pnpm --filter api typecheck

      - name: Test
        run: pnpm --filter api test

      - name: Build (dry-run)
        run: pnpm build:api
